<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教師後台 — CAI 互動挑戰通關紀錄</title>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1565c0;
  --primary-light: #e3f2fd;
  --primary-dark: #0d47a1;
  --accent: #ff6f00;
  --accent-light: #fff3e0;
  --bg-gradient: linear-gradient(135deg, #e8eaf6 0%, #e3f2fd 100%);
  --card-bg: rgba(255, 255, 255, 0.95);
  --text-main: #263238;
  --text-sub: #546e7a;
  --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
  --border-radius: 16px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Noto Sans TC", "Outfit", sans-serif;
  background: var(--bg-gradient);
  min-height: 100vh;
  color: var(--text-main);
  line-height: 1.6;
  padding: 20px;
}

.container { max-width: 1200px; margin: 0 auto; }

header {
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border-radius: var(--border-radius);
  padding: 20px 28px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}

header h1 {
  font-size: 24px;
  font-weight: 900;
  color: var(--primary-dark);
  display: flex;
  align-items: center;
  gap: 10px;
}

header .user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  color: var(--text-sub);
}

.btn {
  padding: 10px 22px;
  border: none;
  border-radius: 24px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(21,101,192,0.25); }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
.btn-secondary { background: #cfd8dc; color: var(--text-main); }
.btn-secondary:hover { background: #b0bec5; transform: translateY(-2px); }
.btn-danger { background: #e53935; color: white; }
.btn-danger:hover { background: #c62828; }

/* ====== 登入畫面 ====== */
.login-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.login-box {
  background: white;
  border-radius: 20px;
  padding: 36px 32px;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
  text-align: center;
}
.login-box h2 { color: var(--primary-dark); margin-bottom: 8px; font-size: 24px; }
.login-box p { color: var(--text-sub); margin-bottom: 20px; font-size: 14px; }
.login-box input {
  width: 100%;
  padding: 12px 16px;
  margin-bottom: 12px;
  border: 2px solid #cfd8dc;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  transition: var(--transition);
}
.login-box input:focus { outline: none; border-color: var(--primary); }
.login-box .btn { width: 100%; justify-content: center; margin-top: 8px; }
.login-error { color: #c62828; font-size: 13px; min-height: 18px; margin-top: 8px; }

/* ====== 統計卡片 ====== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  padding: 18px 22px;
  box-shadow: var(--shadow);
  border-left: 5px solid var(--primary);
}
.stat-card.amber { border-left-color: #f9a825; }
.stat-card.green { border-left-color: #43a047; }
.stat-card.purple { border-left-color: #8e24aa; }
.stat-card .label { font-size: 13px; color: var(--text-sub); margin-bottom: 4px; }
.stat-card .value { font-size: 28px; font-weight: 900; color: var(--text-main); font-family: 'Outfit', sans-serif; }
.stat-card .sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

/* ====== 篩選區 ====== */
.filter-bar {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-sub);
}
.filter-bar select,
.filter-bar input {
  padding: 8px 12px;
  border: 1px solid #cfd8dc;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  background: white;
  transition: var(--transition);
}
.filter-bar select:focus,
.filter-bar input:focus { outline: none; border-color: var(--primary); }
.filter-bar .spacer { flex: 1; }
.filter-bar .action-group { display: flex; gap: 8px; }

/* ====== 表格 ====== */
.table-wrapper {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
thead { background: var(--primary-dark); color: white; }
th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #eceff1; }
th { font-weight: 700; cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { background: var(--primary); }
th.sort-asc::after { content: ' ▲'; font-size: 11px; opacity: 0.8; }
th.sort-desc::after { content: ' ▼'; font-size: 11px; opacity: 0.8; }
tbody tr:hover { background: #f5f7fa; }
tbody tr:nth-child(even) { background: #fafbfc; }
tbody tr:nth-child(even):hover { background: #f5f7fa; }
td .score-cell { font-family: 'Outfit', sans-serif; font-weight: 700; }
td .total-cell { font-family: 'Outfit', sans-serif; font-weight: 900; color: var(--accent); font-size: 16px; }
td .chapter-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
  background: var(--primary-light);
  color: var(--primary-dark);
}
td .delete-btn {
  background: none;
  border: none;
  color: #e53935;
  cursor: pointer;
  font-size: 16px;
  padding: 4px 8px;
  border-radius: 6px;
  transition: var(--transition);
}
td .delete-btn:hover { background: #ffebee; }
.empty-row td { text-align: center; color: var(--text-sub); padding: 40px; }

/* ====== 載入中 ====== */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-sub);
  font-size: 15px;
}
.loading::before {
  content: '⏳ ';
  animation: spin 1.5s linear infinite;
  display: inline-block;
}
@keyframes spin { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

@media (max-width: 700px) {
  .filter-bar { flex-direction: column; align-items: stretch; }
  .filter-bar .spacer { display: none; }
  header { flex-direction: column; text-align: center; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  th, td { padding: 8px 10px; font-size: 13px; }
}
</style>
</head>
<body>

<div class="container">

  <!-- 登入畫面 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2>🔐 教師後台登入</h2>
      <p>請輸入教師帳號密碼以檢視通關紀錄</p>
      <input type="email" id="loginEmail" placeholder="電子郵件" autocomplete="email">
      <input type="password" id="loginPassword" placeholder="密碼" autocomplete="current-password">
      <button class="btn btn-primary" id="loginBtn">✓ 登入</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- 主要畫面 -->
  <header id="mainHeader" style="display:none;">
    <h1>📊 CAI 互動挑戰 — 通關紀錄後台</h1>
    <div class="user-info">
      <span id="userEmail"></span>
      <button class="btn btn-secondary" id="refreshBtn">🔄 重新載入</button>
      <button class="btn btn-danger" id="logoutBtn">🚪 登出</button>
    </div>
  </header>

  <div id="mainContent" style="display:none;">

    <!-- 統計卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">總通關人數</div>
        <div class="value" id="statTotal">0</div>
        <div class="sub">本次篩選結果</div>
      </div>
      <div class="stat-card amber">
        <div class="label">平均總分</div>
        <div class="value" id="statAvg">0</div>
        <div class="sub">滿分 100 分</div>
      </div>
      <div class="stat-card green">
        <div class="label">滿分人數</div>
        <div class="value" id="statFull">0</div>
        <div class="sub">總分 = 100</div>
      </div>
      <div class="stat-card purple">
        <div class="label">及格人數</div>
        <div class="value" id="statPass">0</div>
        <div class="sub">總分 ≥ 60</div>
      </div>
    </div>

    <!-- 篩選區 -->
    <div class="filter-bar">
      <label>章節：</label>
      <select id="filterChapter">
        <option value="all">全部章節</option>
      </select>

      <label>班級：</label>
      <select id="filterClass">
        <option value="all">全部班級</option>
      </select>

      <label>姓名：</label>
      <input type="text" id="filterName" placeholder="搜尋學生姓名">

      <div class="spacer"></div>

      <div class="action-group">
        <button class="btn btn-secondary" id="exportBtn">📥 匯出 CSV</button>
        <button class="btn btn-danger" id="deleteAllBtn">🗑️ 清空全部</button>
      </div>
    </div>

    <!-- 紀錄表格 -->
    <div class="table-wrapper">
      <table id="recordTable">
        <thead>
          <tr>
            <th data-sort="chapter">章節</th>
            <th data-sort="classId">班級座號</th>
            <th data-sort="name">姓名</th>
            <th data-sort="score1">挑戰一</th>
            <th data-sort="score2">挑戰二</th>
            <th data-sort="score3">挑戰三</th>
            <th data-sort="total">總分</th>
            <th data-sort="date">完成日期</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="recordBody">
          <tr><td colspan="9" class="empty-row">載入中...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script>
// ====== Firebase 初始化 ======
const firebaseConfig = {
  apiKey: "AIzaSyBnIkk08DpjkkQDeSOusaM8GWqAqmDqqGA",
  authDomain: "tscpsystem.firebaseapp.com",
  databaseURL: "https://tscpsystem-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tscpsystem",
  storageBucket: "tscpsystem.firebasestorage.app",
  messagingSenderId: "246550546781",
  appId: "1:246550546781:web:d26a020eb05f3a25fa40b4",
  measurementId: "G-18HH2Q1CY6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ====== 全域狀態 ======
let allRecords = [];
let currentSort = { field: 'timestamp', dir: 'desc' };

// ====== 登入處理 ======
document.getElementById('loginBtn').addEventListener('click', () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  if (!email || !pwd) {
    errEl.textContent = '請輸入電子郵件與密碼';
    return;
  }
  errEl.textContent = '登入中...';
  auth.signInWithEmailAndPassword(email, pwd)
    .then(() => { errEl.textContent = ''; })
    .catch(err => {
      console.warn(err);
      errEl.textContent = '登入失敗：' + (err.message || '請確認帳密');
    });
});

document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  auth.signOut();
});

// ====== Auth 監聽 ======
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainHeader').style.display = '';
    document.getElementById('mainContent').style.display = '';
    document.getElementById('userEmail').textContent = '👤 ' + user.email;
    loadRecords();
  } else {
    document.getElementById('loginOverlay').style.display = '';
    document.getElementById('mainHeader').style.display = 'none';
    document.getElementById('mainContent').style.display = 'none';
  }
});

// ====== 載入紀錄 ======
async function loadRecords() {
  const tbody = document.getElementById('recordBody');
  tbody.innerHTML = '<tr><td colspan="9" class="empty-row"><div class="loading">載入中</div></td></tr>';
  try {
    const snapshot = await db.collection('completions').orderBy('timestamp', 'desc').limit(500).get();
    allRecords = snapshot.docs.map(doc => {
      const d = doc.data();
      const ts = d.timestamp ? d.timestamp.toDate() : null;
      return {
        id: doc.id,
        chapter: d.chapter || '',
        chapterTitle: d.chapterTitle || '',
        classId: d.classId || '',
        name: d.name || '',
        scores: d.scores || [0, 0, 0],
        total: d.total || 0,
        clientDate: d.clientDate || '',
        timestamp: ts,
        score1: (d.scores || [0, 0, 0])[0] || 0,
        score2: (d.scores || [0, 0, 0])[1] || 0,
        score3: (d.scores || [0, 0, 0])[2] || 0,
        date: ts
      };
    });
    updateChapterFilter();
    renderTable();
  } catch (err) {
    console.warn('讀取失敗：', err);
    tbody.innerHTML = '<tr><td colspan="9" class="empty-row">❌ 讀取失敗：' + (err.message || '權限不足') + '</td></tr>';
  }
}

// ====== 更新章節篩選下拉 ======
function updateChapterFilter() {
  const sel = document.getElementById('filterChapter');
  const current = sel.value || 'all';
  const chapters = [...new Set(allRecords.map(r => r.chapter).filter(Boolean))].sort();
  sel.innerHTML = '<option value="all">全部章節</option>' +
    chapters.map(c => `<option value="${c}">${c}</option>`).join('');
  sel.value = current;
}

// ====== 班級篩選下拉 ======
function updateClassFilter() {
  const sel = document.getElementById('filterClass');
  const current = sel.value || 'all';
  const chapter = document.getElementById('filterChapter').value;
  const filtered = chapter === 'all'
    ? allRecords
    : allRecords.filter(r => r.chapter === chapter);
  const classes = [...new Set(filtered.map(r => r.classId).filter(Boolean))].sort();
  sel.innerHTML = '<option value="all">全部班級</option>' +
    classes.map(c => `<option value="${c}">${c}</option>`).join('');
  sel.value = current === 'all' || classes.includes(current) ? current : 'all';
}

// ====== 篩選與排序 ======
function getFilteredRecords() {
  const chapter = document.getElementById('filterChapter').value;
  const cls = document.getElementById('filterClass').value;
  const name = document.getElementById('filterName').value.trim().toLowerCase();

  let filtered = allRecords.slice();
  if (chapter !== 'all') filtered = filtered.filter(r => r.chapter === chapter);
  if (cls !== 'all') filtered = filtered.filter(r => r.classId === cls);
  if (name) filtered = filtered.filter(r => r.name.toLowerCase().includes(name));

  // 排序
  const f = currentSort.field;
  const dir = currentSort.dir === 'asc' ? 1 : -1;
  filtered.sort((a, b) => {
    let va = a[f], vb = b[f];
    if (f === 'timestamp') { va = a.timestamp ? a.timestamp.getTime() : 0; vb = b.timestamp ? b.timestamp.getTime() : 0; }
    if (f === 'total' || f === 'score1' || f === 'score2' || f === 'score3') { va = Number(va); vb = Number(vb); }
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'string' && typeof vb === 'string') return va.localeCompare(vb, 'zh-TW') * dir;
    return (va > vb ? 1 : va < vb ? -1 : 0) * dir;
  });
  return filtered;
}

// ====== 渲染表格 ======
function renderTable() {
  updateClassFilter();
  const filtered = getFilteredRecords();
  const tbody = document.getElementById('recordBody');

  // 更新表頭排序狀態
  document.querySelectorAll('#recordTable th[data-sort]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.sort === currentSort.field) {
      th.classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-row">沒有符合條件的紀錄</td></tr>';
    updateStats([]);
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const dateStr = r.timestamp
      ? r.timestamp.getFullYear() + '-' + String(r.timestamp.getMonth() + 1).padStart(2, '0') + '-' + String(r.timestamp.getDate()).padStart(2, '0') + ' ' + String(r.timestamp.getHours()).padStart(2, '0') + ':' + String(r.timestamp.getMinutes()).padStart(2, '0')
      : (r.clientDate || '—');
    return `
      <tr>
        <td><span class="chapter-badge">${r.chapter || '—'}</span></td>
        <td>${r.classId || '—'}</td>
        <td>${r.name || '—'}</td>
        <td class="score-cell">${r.score1} / 25</td>
        <td class="score-cell">${r.score2} / 50</td>
        <td class="score-cell">${r.score3} / 25</td>
        <td class="total-cell">${r.total} / 100</td>
        <td>${dateStr}</td>
        <td><button class="delete-btn" data-id="${r.id}" title="刪除紀錄">🗑️</button></td>
      </tr>
    `;
  }).join('');

  // 綁定刪除按鈕
  tbody.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('確定刪除這筆紀錄？此操作無法復原。')) return;
      try {
        await db.collection('completions').doc(btn.dataset.id).delete();
        loadRecords();
      } catch (err) {
        alert('刪除失敗：' + err.message);
      }
    });
  });

  updateStats(filtered);
}

// ====== 統計 ======
function updateStats(records) {
  const n = records.length;
  document.getElementById('statTotal').textContent = n;
  if (n === 0) {
    document.getElementById('statAvg').textContent = '0';
    document.getElementById('statFull').textContent = '0';
    document.getElementById('statPass').textContent = '0';
    return;
  }
  const total = records.reduce((sum, r) => sum + r.total, 0);
  const avg = (total / n).toFixed(1);
  const full = records.filter(r => r.total >= 100).length;
  const pass = records.filter(r => r.total >= 60).length;
  document.getElementById('statAvg').textContent = avg;
  document.getElementById('statFull').textContent = full;
  document.getElementById('statPass').textContent = pass;
}

// ====== 排序按鈕 ======
document.querySelectorAll('#recordTable th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const f = th.dataset.sort;
    if (currentSort.field === f) {
      currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      currentSort.field = f;
      currentSort.dir = 'asc';
    }
    renderTable();
  });
});

// ====== 篩選事件 ======
document.getElementById('filterChapter').addEventListener('change', renderTable);
document.getElementById('filterClass').addEventListener('change', renderTable);
document.getElementById('filterName').addEventListener('input', renderTable);
document.getElementById('refreshBtn').addEventListener('click', loadRecords);

// ====== 匯出 CSV ======
document.getElementById('exportBtn').addEventListener('click', () => {
  const filtered = getFilteredRecords();
  if (filtered.length === 0) { alert('沒有可匯出的紀錄'); return; }
  const headers = ['章節', '章節標題', '班級座號', '姓名', '挑戰一(/25)', '挑戰二(/50)', '挑戰三(/25)', '總分(/100)', '完成日期', '完成時間'];
  const rows = filtered.map(r => {
    const dateStr = r.timestamp
      ? r.timestamp.getFullYear() + '-' + String(r.timestamp.getMonth() + 1).padStart(2, '0') + '-' + String(r.timestamp.getDate()).padStart(2, '0')
      : r.clientDate || '';
    const timeStr = r.timestamp
      ? String(r.timestamp.getHours()).padStart(2, '0') + ':' + String(r.timestamp.getMinutes()).padStart(2, '0')
      : '';
    return [r.chapter, r.chapterTitle, r.classId, r.name, r.score1, r.score2, r.score3, r.total, r.clientDate || dateStr, timeStr].join(',');
  });
  const csv = '\uFEFF' + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const today = new Date();
  const fname = `通關紀錄_${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}.csv`;
  link.href = URL.createObjectURL(blob);
  link.download = fname;
  link.click();
  URL.revokeObjectURL(link.href);
});

// ====== 清空全部 ======
document.getElementById('deleteAllBtn').addEventListener('click', async () => {
  if (!confirm('⚠️ 確定清空「目前篩選結果」中的所有紀錄嗎？\n此操作無法復原！')) return;
  if (!confirm('再次確認：真的要刪除全部紀錄嗎？')) return;
  const filtered = getFilteredRecords();
  try {
    const batch = db.batch();
    filtered.forEach(r => batch.delete(db.collection('completions').doc(r.id)));
    await batch.commit();
    alert(`已刪除 ${filtered.length} 筆紀錄`);
    loadRecords();
  } catch (err) {
    alert('刪除失敗：' + err.message);
  }
});
</script>
